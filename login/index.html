<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Vault</title>
  <!-- SVG Favicon (modern browsers) -->
  <link rel="icon" type="icon/svg+xml" href="../icon.svg">

  <!-- PNG Favicon (fallback for older browsers) -->
  <link rel="icon" type="icon/png" sizes="32x32" href="../icon.png">
  <link rel="icon" type="icon/png" sizes="16x16" href="../icon.png">


  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>

  <nav class="navbar">
    <h1 class="logo"><img src="../icon.svg" alt="logo">Password Vault</h1>

    <ul>
      <a href="../Mainpage/main_index.html">Home</a>
      <li>About</li>
      <li>Services</li>
      <li>Contact</li>
    </ul>

    <button class="theme-toggle">🌙</button>
  </nav>

  <section class="hero">

    <!-- LEFT : Floating gradient shape -->
    <div class="hero-img">

      <div class="floating-text">
        <h1 class="hero-title">
          The safest way<br>
          to manage your<br>
          <span id="changingWord" class="changing-word"></span>
        </h1>
      </div>

    </div>




    <!-- CENTER : Password Generator (hidden until click) -->
    <div class="generator-box" id="generatorBox">
      <h3>Generate Password</h3>

      <div class="gen-box">
        <input type="text" id="generatedPassword" readonly>
        <button class="copy-btn" onclick="copyPassword()">
          <i class="fa-regular fa-copy"></i>
        </button>

      </div>

      <p>Password Length: <b id="lengthValue">8</b></p>
      <input type="range" min="6" max="20" value="8" id="lengthSlider">

      <div class="options">
        <label><input type="checkbox" id="upper" checked> Mixed case</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Special characters</label>
      </div>

      <button class="gen-btn" onclick="generatePassword()">Generate Password</button>
    </div>


    <!-- RIGHT : Login/Register -->
    <div class="login-box" id="authBox">

      <!-- LOGIN -->
      <div class="form login">
        <h2>Login</h2>
        <br>
        <div class="phone-wrap">
          <span class="prefix">+91</span>
          <input id="loginUser" type="text" placeholder="Username">
        </div>

        <input id="loginPass" type="password" placeholder="Enter your password">

        <small id="otpMsg" class="otp-msg"></small>

        <label class="show-pass">
          <input type="checkbox" id="loginShowPass">
          <span id="toggleText">Show password</span>
        </label>



        <button id="loginBtn">Login</button>


        <div class="divider">OR</div>

        <div class="social-login">
          <button class="social google"><i class="fa-brands fa-google"></i></button>
          <button class="social github">
            <i class="fa-brands fa-github"></i>
          </button>

          <button class="social phone">
            <i class="fa-solid fa-phone"></i></button>

          <button class="social linkedin"><i class="fa-brands fa-linkedin-in"></i></button>
        </div>

        <p>No account? <span onclick="showRegister()">Register</span></p>
      </div>


      <!-- REGISTER -->
      <div class="form register">
        <h2>Register</h2>
        <br>
        <input id="regUser" type="text" placeholder="Username">

        <div class="pass-wrap">
          <input id="regPass" type="password" placeholder="Enter your password">
          <i class="fa-regular fa-eye toggle-eye" onclick="toggleEye('regPass', this)"></i>
        </div>

        <div class="pass-wrap">
          <input id="confirmPass" type="password" placeholder="Confirm password">
          <i class="fa-regular fa-eye toggle-eye" onclick="toggleEye('confirmPass', this)"></i>
        </div>

        <small id="matchMsg" class="match-msg"></small>


        <div class="strength">
          <div id="strengthBar"></div>
          <small id="strengthText">Strength</small>
        </div>

        <button type="button" onclick="toggleGenerator()">Password Generator</button>
        <button id="registerBtn" onclick="register()" disabled>Register</button>


        <p>Have account? <span onclick="showLogin()">Login</span></p>
      </div>

    </div>

  </section>

  <div id="recaptcha-container"></div>

  <script src="script.js"></script>
  <script type="module" src="auth.js"></script>

    <script>
  document.addEventListener("DOMContentLoaded", () => {

    if(localStorage.getItem("showRegister") === "true")
    {
        document.getElementById("authBox").classList.add("active");
        localStorage.removeItem("showRegister");
    }

  });
  </script>
  
</body>

</html>
